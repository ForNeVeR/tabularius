# This file is auto-generated.
name: Main
on:
  push:
    branches:
    - main
    - renovate/**
  pull_request:
    branches:
    - main
  schedule:
  - cron: 0 0 * * 6
  workflow_dispatch: 
jobs:
  verify-workflows:
    runs-on: ubuntu-24.04
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.github/nuget-packages
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        key: ${{ runner.os }}.nuget.${{ hashFiles('**/*.*proj', '**/*.props') }}
        path: ${{ env.NUGET_PACKAGES }}
    - run: dotnet fsi ./scripts/github-actions.fsx verify
  check:
    strategy:
      matrix:
        image:
        - macos-15
        - ubuntu-24.04
        - ubuntu-24.04-arm
        - windows-2025
      fail-fast: false
    runs-on: ${{ matrix.image }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.github/nuget-packages
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        key: ${{ runner.os }}.nuget.${{ hashFiles('**/*.*proj', '**/*.props') }}
        path: ${{ env.NUGET_PACKAGES }}
    - name: Set up Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-version: 3.9.1
    - id: stack
      name: Determine the Stack root directory
      shell: pwsh
      run: |-
        $stackRoot = stack path --stack-root
        if (!$?) { throw "Stack exit code: $LASTEXITCODE" }
        else {
            Write-Host "stack-root=$stackRoot"
            "stack-root=$stackRoot" >> $env:GITHUB_OUTPUT
        }
    - name: Cache Stack dependencies
      uses: actions/cache@v5
      with:
        key: main.${{ matrix.image }}.stack.${{ hashFiles('HledgerInterop/stack.yaml', 'HledgerInterop/stack.yaml.lock', 'HledgerInterop/*.cabal') }}
        path: ${{ steps.stack.outputs.stack-root }}
    - name: Test HledgerInterop
      shell: pwsh
      run: stack test
      working-directory: HledgerInterop
    - if: runner.os == 'Linux' && runner.arch == 'ARM64'
      name: Work around a SkiaSharp issue on ARM64 Linux
      run: echo "LD_PRELOAD=/lib/aarch64-linux-gnu/libuuid.so.1:/lib/aarch64-linux-gnu/libfreetype.so.6" >> $GITHUB_ENV
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test
      timeout-minutes: 10
  licenses:
    runs-on: ubuntu-24.04
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: REUSE license check
      uses: fsfe/reuse-action@v6
  encoding:
    runs-on: ubuntu-24.04
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Verify encoding
      shell: pwsh
      run: Install-Module VerifyEncoding -Repository PSGallery -RequiredVersion 2.2.1 -Force && Test-Encoding
  todos:
    runs-on: ubuntu-24.04
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Check TODOs
      uses: ForNeVeR/Todosaurus/action@v1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        strict: true
