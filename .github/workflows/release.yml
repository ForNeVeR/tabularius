# This file is auto-generated.
name: Release
on:
  push:
    branches:
    - main
    - renovate/**
    tags:
    - v*
  pull_request:
    branches:
    - main
  schedule:
  - cron: 0 0 * * 6
  workflow_dispatch: 
jobs:
  publish:
    strategy:
      matrix:
        image:
        - macos-15
        - ubuntu-24.04
        - ubuntu-24.04-arm
        - windows-2025
      fail-fast: false
    runs-on: ${{ matrix.image }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.github/nuget-packages
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        key: ${{ runner.os }}.nuget.${{ hashFiles('**/*.*proj', '**/*.props') }}
        path: ${{ env.NUGET_PACKAGES }}
    - id: hledger-interop-bin
      name: Cache HledgerInterop build output
      uses: actions/cache@v5
      with:
        key: release.${{ matrix.image }}.hledger-bin.${{ hashFiles('HledgerInterop/HledgerInterop.proj', 'HledgerInterop/include/**/*.h', 'HledgerInterop/src/**/*.hs', 'HledgerInterop/src/**/*.hsc', 'HledgerInterop/test/**/*.hs', 'HledgerInterop/test/**/*.hsc', 'HledgerInterop/*.cabal', 'HledgerInterop/*.def', 'HledgerInterop/*.yaml', 'HledgerInterop/*.yaml.lock') }}
        path: HledgerInterop/bin
    - if: steps.hledger-interop-bin.outputs.cache-hit == 'true'
      name: Refresh cached HledgerInterop output timestamps
      shell: pwsh
      run: |-
        Get-ChildItem -Path HledgerInterop/bin -Recurse -File |
            ForEach-Object { $_.LastWriteTimeUtc = [DateTime]::UtcNow }
    - if: ${{ steps.hledger-interop-bin.outputs.cache-hit != 'true' }}
      name: Set up Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-version: 3.9.1
    - if: ${{ steps.hledger-interop-bin.outputs.cache-hit != 'true' }}
      id: stack
      name: Determine the Stack root directory
      shell: pwsh
      run: |-
        $stackRoot = stack path --stack-root
        if (!$?) { throw "Stack exit code: $LASTEXITCODE" }
        else {
            Write-Host "stack-root=$stackRoot"
            "stack-root=$stackRoot" >> $env:GITHUB_OUTPUT
        }
    - if: ${{ steps.hledger-interop-bin.outputs.cache-hit != 'true' }}
      name: Cache Stack dependencies
      uses: actions/cache@v5
      with:
        key: release.${{ matrix.image }}.stack.${{ hashFiles('HledgerInterop/stack.yaml', 'HledgerInterop/stack.yaml.lock', 'HledgerInterop/*.cabal') }}
        path: ${{ steps.stack.outputs.stack-root }}
    - id: version
      name: Get version
      shell: pwsh
      run: echo "version=$(scripts/Get-Version.ps1 -RefName $env:GITHUB_REF)" >> $env:GITHUB_OUTPUT
    - if: runner.os == 'Linux' && runner.arch == 'ARM64'
      name: Work around a SkiaSharp issue on ARM64 Linux
      run: echo "LD_PRELOAD=/lib/aarch64-linux-gnu/libuuid.so.1:/lib/aarch64-linux-gnu/libfreetype.so.6" >> $GITHUB_ENV
    - name: Build the project
      shell: pwsh
      run: dotnet build --configuration Release -p:Version=${{ steps.version.outputs.version }}
    - name: Publish the project
      shell: pwsh
      run: dotnet publish --configuration Release --self-contained -p:Version=${{ steps.version.outputs.version }}
    - name: Pack the publication result
      shell: pwsh
      run: Compress-Archive -Path Tabularius/bin/publish/* -DestinationPath tabularius-${{ steps.version.outputs.version }}-${{ matrix.image }}.zip
    - name: Upload the publication result
      uses: actions/upload-artifact@v7
      with:
        name: tabularius-${{ matrix.image }}
        path: ./tabularius-${{ steps.version.outputs.version }}-${{ matrix.image }}.zip
  release:
    permissions:
      contents: write
    needs:
    - publish
    runs-on: ubuntu-24.04
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.github/nuget-packages
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        key: ${{ runner.os }}.nuget.${{ hashFiles('**/*.*proj', '**/*.props') }}
        path: ${{ env.NUGET_PACKAGES }}
    - id: version
      name: Get version
      shell: pwsh
      run: echo "version=$(scripts/Get-Version.ps1 -RefName $env:GITHUB_REF)" >> $env:GITHUB_OUTPUT
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true
        pattern: tabularius-*
    - name: Read changelog
      uses: ForNeVeR/ChangelogAutomation.action@v2
      with:
        output: ./release-notes.md
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        path: |-
          ./release-notes.md
          ./tabularius-*.zip
    - if: startsWith(github.ref, 'refs/tags/v')
      name: Create a release
      uses: softprops/action-gh-release@v2
      with:
        body_path: ./release-notes.md
        files: ./tabularius-*.zip
        name: Tabularius v${{ steps.version.outputs.version }}
